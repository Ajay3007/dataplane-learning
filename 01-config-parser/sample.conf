# ─────────────────────────────────────────────────────────────
# DP Application Config File
# Format: INI-style  (section + key=value)
# Comments: lines starting with # or ; are ignored
#           inline comments after values are also supported
# ─────────────────────────────────────────────────────────────

# ── EAL (Environment Abstraction Layer) ──────────────────────
# These values are used to build the argv[] passed to rte_eal_init().
# DPDK takes over the CPUs listed here exclusively — no OS tasks run on them.
[eal]
cores         = 0-7             # lcore range handed to DPDK
socket_mem    = 2048            # MB of hugepage memory per NUMA socket
hugepage_sz   = 2048            # hugepage size in KB  (2MB is standard)
log_level     = 7               # DPDK internal log verbosity (0-8)

# ── NIC Port ─────────────────────────────────────────────────
# Maps to rte_eth_dev_configure() arguments.
# rx_desc / tx_desc must be a power of 2 (hardware constraint).
[port]
port_id       = 0
num_rx_queues = 4               # one queue per worker lcore
num_tx_queues = 4
rx_desc       = 1024            # RX descriptor ring size
tx_desc       = 1024            # TX descriptor ring size
mtu           = 1500

# ── Lcore / Worker Assignment ─────────────────────────────────
# In DPDK, each lcore has a fixed role. Mixing roles on one core
# kills throughput. The real app reads these and calls
# rte_eal_remote_launch() to start the correct function on each lcore.
[worker]
rx_lcore      = 1               # dedicated receive lcore
tx_lcore      = 2               # dedicated transmit lcore
worker_lcores = 3,4,5,6         # packet processing / policy decision lcores

# ── Kafka ─────────────────────────────────────────────────────
# rd_kafka_conf_set() is called with these values during Kafka init.
# topic_policy  : incoming policy updates from the Provisioning Module
# topic_cdr     : outgoing CDR (Charging Data Records) exported by DP
[kafka]
broker          = broker.example.com:9092
topic_policy    = policy_updates
topic_cdr       = dp_cdr
group_id        = dp_consumer
poll_timeout_ms = 100

# ── Policy Engine ─────────────────────────────────────────────
# pattern_file  : Hyperscan regex pattern file (global threat DB)
# pattern_file2 : second pattern file (loaded in hs_init_global_scratch)
# max_groups    : max enterprise groups supported
[policy]
pattern_file      = /etc/dp_app/patterns.txt
pattern_file2     = /etc/dp_app/patterns2.txt
max_groups        = 1000
enable_hyperscan  = true

# ── Logging ───────────────────────────────────────────────────
# level: DEBUG | INFO | WARN | ERROR
[logging]
level = INFO
file  = /var/log/dp_app/dp_app.log
